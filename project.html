<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projekt — Julia Zacharzowski</title>
  <meta name="description" content="Projekt aus dem Portfolio von Julia Zacharzowski." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sprach-Toggle -->
  <div class="lang-toggle" role="group" aria-label="Sprache wählen / Choose language">
    <button type="button" class="lang-toggle__btn" data-lang="de">DE</button>
    <button type="button" class="lang-toggle__btn" data-lang="en">EN</button>
  </div>

  <main id="project-root">
    <!-- Inhalt wird per JavaScript eingefügt -->
  </main>

  <!-- Scroll-nach-oben Button -->
  <button type="button" class="scroll-top" id="scroll-top-btn" aria-label="Nach oben scrollen">
    <span class="scroll-top__icon">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 19V5" />
        <path d="m5 12 7-7 7 7" />
      </svg>
    </span>
    <span class="scroll-top__label" data-i18n="scrollTop">Scrollen</span>
  </button>

  <script src="data.js"></script>
  <script src="project.js"></script>
  <script>
    (function () {
      const btn = document.getElementById("scroll-top-btn");
      if (!btn) return;
      const toggle = () => btn.classList.toggle("is-visible", window.scrollY > 400);
      window.addEventListener("scroll", toggle, { passive: true });
      toggle();
      btn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
    })();
  </script>
</body>
</html>
